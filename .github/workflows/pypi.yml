name: PyPI

# Triggered when you publish a new GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API token needed.
#
# One-time setup on PyPI (pypi.org → your project → Publishing → Add publisher):
#   Owner:            ieepirzy   (your GitHub username)
#   Repository:       miragen
#   Workflow filename: pypi.yml
#   Environment name: pypi
#
# Then create the "pypi" environment in GitHub: Settings → Environments → New environment.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
