secrets:
  deepseek_key:
    file: ./secrets/deepseek_key.txt

x-agent-base: &agent-base
  build: .
  restart: unless-stopped
  secrets:
    - deepseek_key
  environment:
    DEEPSEEK_API_KEY_FILE: /run/secrets/deepseek_key
  networks:
    - swarm

services:

  # Interactive agent — POST /run, streams on /run/stream
  assistant:
    <<: *agent-base
    container_name: assistant
    environment:
      DEEPSEEK_API_KEY_FILE: /run/secrets/deepseek_key
      AGENT_PROFILE: agents/assistant/agent.yaml
    ports:
      - "8001:8000"

networks:
  swarm:
    internal: true
